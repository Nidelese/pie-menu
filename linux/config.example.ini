; pie-menu configuration — copy to ~/.config/pie-menu/config.ini
; Every section and key is optional: delete a line to get the default back.

[apps]
; One entry per slice, clockwise from the top: display name = command to run.
; Any number of slices is fine — the angles adapt automatically.
Firefox = firefox
Obsidian = flatpak run md.obsidian.Obsidian
Krita = krita
Audacity = audacity
Steam = steam
OBS = obs
Kdenlive = kdenlive
LMMS = lmms

[colors]
; #RRGGBB or #RRGGBBAA (AA = opacity: 00 invisible … FF solid).
; With 6 digits the default opacity of that element is kept.
; Defaults shown — the pink princess palette.
overlay      = #1E102066
slice        = #2E1830E0
slice_hover  = #F4A7C3F2
border       = #F4A7C373
border_hover = #F4A7C3E6
center       = #1E1020F2
text         = #FDE8F0
text_hover   = #1E1020

[menu]
; Sizes in pixels; gap is the sliver of space between slices, in degrees.
inner_radius = 55
outer_radius = 190
text_radius  = 132
gap_degrees  = 1.43
font         = JetBrainsMono Nerd Font
