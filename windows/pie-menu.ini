; pie-menu.ini — customize your pie without touching the script.
; Keep this file next to PieMenu.ahk (or PieMenu.exe).
; Every section and key is optional: delete a line to get the default back.

[apps]
; One entry per slice, clockwise from the top: display name = what to launch.
; Full paths, App-Paths names (firefox.exe), URLs (steam://) and %ENVVARS%
; all work. Any number of slices is fine — the angles adapt automatically.
Firefox = firefox.exe
Obsidian = %LOCALAPPDATA%\Obsidian\Obsidian.exe
Krita = C:\Program Files\Krita (x64)\bin\krita.exe
Audacity = C:\Program Files\Audacity\Audacity.exe
Steam = steam://open/main
OBS = C:\Program Files\obs-studio\bin\64bit\obs64.exe
Kdenlive = C:\Program Files\kdenlive\bin\kdenlive.exe
LMMS = C:\Program Files\LMMS\lmms.exe

[colors]
; #RRGGBB or #RRGGBBAA (AA = opacity: 00 invisible … FF solid).
; With 6 digits the default opacity of that element is kept.
; Defaults shown — the pink princess palette.
overlay      = #1E102028
vignette     = #1E10204A
slice        = #2E1830E0
slice_hover  = #F4A7C3F2
border       = #F4A7C373
border_hover = #F4A7C3E6
center       = #1E1020F2
text         = #FDE8F0
text_hover   = #1E1020

[menu]
; Sizes in pixels; gap is the sliver of space between slices, in degrees.
inner_radius = 55
outer_radius = 190
text_radius  = 132
gap_degrees  = 1.43
font         = Segoe UI
